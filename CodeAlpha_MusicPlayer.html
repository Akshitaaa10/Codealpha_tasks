<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NANCHAKU — Mixtape Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@400;500;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     DESIGN TOKENS — "Mixtape / Cassette" theme
     Ground: warm near-black, turmeric amber + brick red accents,
     condensed stencil display type, mono utility numerals.
     ============================================================ */
  :root{
    --bg: #100d0a;
    --bg-elevated: #1a1512;
    --bg-card: #201a15;
    --line: #2c2620;
    --text: #f2ece1;
    --text-dim: #9c9186;
    --text-faint: #675e54;
    --amber: #f5a623;
    --amber-dim: #b87d1a;
    --red: #c1272d;
    --red-glow: rgba(193,39,45,0.35);
    --radius: 3px;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 0%, rgba(245,166,35,0.06), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(193,39,45,0.08), transparent 45%);
    color: var(--text);
    font-family: 'Work Sans', sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .display{ font-family:'Anton', sans-serif; text-transform:uppercase; letter-spacing:0.02em; }
  .mono{ font-family:'JetBrains Mono', monospace; }

  ::selection{ background: var(--amber); color:#100d0a; }
  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-track{ background:transparent; }
  ::-webkit-scrollbar-thumb{ background: var(--line); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover{ background: var(--amber-dim); }

  a{ color:inherit; text-decoration:none; }
  button{ font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
  button:focus-visible, [tabindex]:focus-visible, input:focus-visible{
    outline: 2px solid var(--amber);
    outline-offset: 2px;
  }

  /* ================= APP SHELL ================= */
  .app{
    display:grid;
    grid-template-columns: 260px 1fr;
    grid-template-rows: 1fr auto;
    height:100vh;
  }

  /* ================= SIDEBAR ================= */
  .sidebar{
    grid-row: 1 / 2;
    background: var(--bg-elevated);
    border-right: 1px solid var(--line);
    padding: 22px 16px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap: 24px;
  }
  .brand{
    display:flex; align-items:center; gap:10px;
    padding: 0 6px 18px 6px;
    border-bottom: 1px solid var(--line);
  }
  .brand-mark{
    width:34px; height:34px; border-radius:50%;
    border: 2px solid var(--amber);
    display:flex; align-items:center; justify-content:center;
    position:relative;
    flex-shrink:0;
  }
  .brand-mark::before{
    content:"";
    width:6px; height:6px; border-radius:50%;
    background: var(--amber);
  }
  .brand-name{ font-size: 19px; letter-spacing:0.03em; line-height:1; }
  .brand-sub{ font-size:9px; color:var(--text-faint); letter-spacing:0.18em; margin-top:4px; }

  .section-label{
    font-size:10px; letter-spacing:0.18em; color:var(--text-faint);
    text-transform:uppercase; padding: 0 6px; font-family:'JetBrains Mono',monospace;
  }

  .nav-list{ display:flex; flex-direction:column; gap:2px; }
  .nav-item{
    display:flex; align-items:center; gap:10px;
    padding: 8px 6px; border-radius: var(--radius);
    font-size:14px; color:var(--text-dim);
    transition: background .15s, color .15s;
    width:100%; text-align:left;
  }
  .nav-item:hover{ background: rgba(255,255,255,0.04); color:var(--text); }
  .nav-item.active{ color: var(--amber); background: rgba(245,166,35,0.08); }

  .album-list{ display:flex; flex-direction:column; gap:4px; flex:1; overflow-y:auto; }
  .album-item{
    display:flex; align-items:center; gap:10px;
    padding: 7px 6px; border-radius: var(--radius);
    width:100%; text-align:left;
  }
  .album-item:hover{ background: rgba(255,255,255,0.04); }
  .album-item.active{ background: rgba(245,166,35,0.10); }
  .album-item.active .album-item-title{ color: var(--amber); }
  .album-thumb{
    width:32px; height:32px; border-radius:2px; object-fit:cover;
    background: var(--bg-card); flex-shrink:0; border:1px solid var(--line);
  }
  .album-item-title{ font-size:13px; color:var(--text); line-height:1.2; }
  .album-item-artist{ font-size:11px; color:var(--text-faint); }

  /* ================= MAIN ================= */
  .main{
    grid-row: 1 / 2;
    overflow-y:auto;
    position:relative;
  }
  .topbar{
    position:sticky; top:0; z-index:5;
    display:flex; align-items:center; gap:12px;
    padding: 16px 32px;
    background: linear-gradient(to bottom, rgba(16,13,10,0.95), rgba(16,13,10,0.7));
    backdrop-filter: blur(6px);
  }
  .search-box{
    display:flex; align-items:center; gap:8px;
    background: var(--bg-card); border:1px solid var(--line);
    border-radius: 20px; padding: 8px 16px; width: 320px;
    transition: border-color .15s;
  }
  .search-box:focus-within{ border-color: var(--amber-dim); }
  .search-box input{
    background:none; border:none; color:var(--text); font-size:13px; width:100%;
    font-family:'Work Sans',sans-serif;
  }
  .search-box input::placeholder{ color: var(--text-faint); }
  .search-box svg{ flex-shrink:0; opacity:0.5; }

  .hero{
    display:flex; align-items:flex-end; gap:26px;
    padding: 20px 32px 32px 32px;
  }
  .hero-art{
    width:200px; height:200px; border-radius:4px;
    object-fit:cover; box-shadow: 0 20px 50px rgba(0,0,0,0.55);
    border: 1px solid var(--line);
    background: var(--bg-card);
  }
  .hero-info{ display:flex; flex-direction:column; gap:10px; padding-bottom:6px; }
  .hero-eyebrow{
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.2em;
    color: var(--amber); text-transform:uppercase;
  }
  .hero-title{ font-size: 52px; line-height:0.95; }
  .hero-meta{ font-size:13px; color:var(--text-dim); display:flex; align-items:center; gap:8px; }
  .hero-meta .dot{ width:3px; height:3px; background:var(--text-faint); border-radius:50%; }
  .hero-actions{ display:flex; align-items:center; gap:16px; margin-top:8px; }
  .play-all-btn{
    display:flex; align-items:center; gap:8px;
    background: var(--amber); color:#100d0a;
    padding: 11px 22px; border-radius: 30px;
    font-weight:700; font-size:13px; letter-spacing:0.02em;
    transition: transform .12s, background .12s;
  }
  .play-all-btn:hover{ transform: scale(1.03); background:#ffb733; }
  .icon-btn{
    width:38px; height:38px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    color: var(--text-dim); border: 1px solid var(--line);
    transition: color .12s, border-color .12s;
  }
  .icon-btn:hover{ color: var(--amber); border-color: var(--amber-dim); }

  /* ---- tracklist ---- */
  .tracklist{ padding: 0 32px 40px 32px; }

  .view-heading{
    display:flex; align-items:baseline; gap:10px;
    padding: 6px 12px 18px 12px;
  }
  .view-heading .vh-title{ font-size:28px; }
  .view-heading .vh-count{
    font-family:'JetBrains Mono',monospace; font-size:12px; color: var(--text-faint);
  }

  .tl-head{
    display:grid; grid-template-columns: 36px 1fr 90px 40px;
    gap:14px; padding: 0 12px 10px 12px;
    border-bottom:1px solid var(--line);
    font-family:'JetBrains Mono',monospace; font-size:11px;
    color: var(--text-faint); letter-spacing:0.1em; text-transform:uppercase;
  }
  .track-row{
    display:grid; grid-template-columns: 36px 1fr 90px 40px;
    gap:14px; align-items:center;
    padding: 10px 12px; border-radius: var(--radius);
    transition: background .12s;
  }
  .track-row:hover{ background: rgba(255,255,255,0.035); }
  .track-row.playing{ background: rgba(245,166,35,0.07); }
  .track-num{
    font-family:'JetBrains Mono',monospace; color: var(--text-faint); font-size:13px;
    display:flex; align-items:center; justify-content:center; position:relative;
  }
  .track-row:hover .track-num-text{ display:none; }
  .track-row:hover .track-play-icon{ display:flex; }
  .track-play-icon{ display:none; align-items:center; justify-content:center; color:var(--text); }
  .track-row.playing .track-num-text{ display:none; }
  .track-row.playing .track-play-icon{ display:flex; color: var(--amber); }

  .eq-bars{ display:flex; align-items:flex-end; gap:2px; height:14px; }
  .eq-bars span{
    width:3px; background: var(--amber); border-radius:1px;
    animation: eq 0.9s ease-in-out infinite;
  }
  .eq-bars span:nth-child(1){ animation-delay: -0.6s; }
  .eq-bars span:nth-child(2){ animation-delay: -0.3s; }
  .eq-bars span:nth-child(3){ animation-delay: -0.9s; }
  @keyframes eq{
    0%,100%{ height:3px; } 50%{ height:14px; }
  }

  .track-info{ display:flex; flex-direction:column; gap:2px; min-width:0; cursor:pointer; }
  .track-title{ font-size:14px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .track-row.playing .track-title{ color: var(--amber); }
  .track-artist{ font-size:12px; color:var(--text-faint); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .track-duration{ font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-faint); text-align:right; }
  .track-like{ color: var(--text-faint); display:flex; align-items:center; justify-content:center; transition: color .12s; }
  .track-like:hover, .track-like.active{ color: var(--red); }

  .empty-note{
    margin-top:18px; padding:14px 16px; background: var(--bg-card);
    border:1px dashed var(--line); border-radius: var(--radius);
    font-family:'JetBrains Mono',monospace; font-size:11.5px; color: var(--text-faint); line-height:1.6;
  }
  .empty-note b{ color: var(--amber); }

  /* ================= PLAYER BAR ================= */
  .player-bar{
    grid-column: 1 / -1;
    display:grid; grid-template-columns: 280px 1fr 280px;
    align-items:center;
    background: var(--bg-elevated);
    border-top: 1px solid var(--line);
    padding: 12px 20px;
    gap: 20px;
  }
  .pb-nowplaying{ display:flex; align-items:center; gap:12px; min-width:0; }
  .pb-art{
    width:52px; height:52px; border-radius:3px; object-fit:cover;
    border:1px solid var(--line); background: var(--bg-card); flex-shrink:0;
  }
  .pb-art.spinning{ animation: spin 3.2s linear infinite; border-radius:50%; }
  @keyframes spin{ from{ transform:rotate(0deg);} to{ transform:rotate(360deg);} }
  .pb-text{ min-width:0; }
  .pb-title{ font-size:13px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pb-artist{ font-size:11.5px; color:var(--text-faint); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pb-like{ color: var(--text-faint); flex-shrink:0; }
  .pb-like:hover, .pb-like.active{ color: var(--red); }

  .pb-center{ display:flex; flex-direction:column; align-items:center; gap:8px; }
  .pb-controls{ display:flex; align-items:center; gap:20px; }
  .pb-ctrl-btn{ color: var(--text-dim); transition:color .12s; }
  .pb-ctrl-btn:hover{ color: var(--text); }
  .pb-play{
    width:34px; height:34px; border-radius:50%; background: var(--text);
    color: var(--bg); display:flex; align-items:center; justify-content:center;
    transition: transform .12s, background .12s;
  }
  .pb-play:hover{ transform: scale(1.06); background: var(--amber); }

  .pb-progress-row{ display:flex; align-items:center; gap:10px; width:100%; }
  .pb-time{ font-family:'JetBrains Mono',monospace; font-size:10.5px; color: var(--text-faint); width:36px; }
  .pb-time.right{ text-align:right; }
  .pb-track-bar{
    flex:1; height: 16px; display:flex; align-items:center; cursor:pointer; position:relative;
  }
  .pb-track-bar-bg{
    width:100%; height:4px; background: var(--line); border-radius:2px; overflow:hidden; position:relative;
  }
  .pb-track-bar-fill{
    height:100%; background: var(--amber); width:0%; border-radius:2px;
  }
  .pb-track-bar-handle{
    position:absolute; top:50%; width:11px; height:11px; border-radius:50%;
    background: var(--amber); transform: translate(-50%,-50%); left:0%;
    opacity:0; transition: opacity .12s; box-shadow: 0 0 8px var(--red-glow);
  }
  .pb-track-bar:hover .pb-track-bar-handle{ opacity:1; }

  .pb-right{ display:flex; align-items:center; justify-content:flex-end; gap:14px; }
  .pb-vol-row{ display:flex; align-items:center; gap:8px; width:110px; }
  .pb-vol-bar{ flex:1; height:4px; background:var(--line); border-radius:2px; position:relative; cursor:pointer; }
  .pb-vol-fill{ height:100%; background: var(--text-dim); border-radius:2px; width:70%; }

  /* scrollbar-less thin utility */
  .badge{
    font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.1em;
    color:#100d0a; background: var(--red); padding:2px 7px; border-radius:2px;
    text-transform:uppercase;
  }

  /* Responsive */
  @media (max-width: 860px){
    .app{ grid-template-columns: 1fr; }
    .sidebar{ display:none; }
    .player-bar{ grid-template-columns: 1fr; row-gap:10px; }
    .pb-right{ display:none; }
    .hero{ flex-direction:column; align-items:flex-start; }
    .hero-title{ font-size:36px; }
  }

  @media (prefers-reduced-motion: reduce){
    .eq-bars span, .pb-art.spinning{ animation: none !important; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- ================= SIDEBAR ================= -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div>
        <div class="brand-name display">NANCHAKU</div>
        <div class="brand-sub">underground / mixtape deck</div>
      </div>
    </div>

    <nav class="nav-list">
      <button class="nav-item active" data-view="home">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg>
        Home
      </button>
      <button class="nav-item" data-view="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        Search
      </button>
      <button class="nav-item" data-view="liked">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.6l-1-1a5.5 5.5 0 10-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 000-7.8z"/></svg>
        Liked Tracks
      </button>
    </nav>

    <div>
      <div class="section-label" style="margin-bottom:10px;">Mixtapes</div>
      <div class="album-list" id="albumList"></div>
    </div>
  </aside>

  <!-- ================= MAIN ================= -->
  <main class="main" id="main">
    <div class="topbar">
      <div class="search-box">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input type="text" id="searchInput" placeholder="Search tracks, artists, mixtapes...">
      </div>
    </div>

    <section class="hero" id="heroSection">
      <img class="hero-art" id="heroArt" src="" alt="">
      <div class="hero-info">
        <span class="hero-eyebrow" id="heroEyebrow">Mixtape</span>
        <h1 class="hero-title display" id="heroTitle">—</h1>
        <div class="hero-meta">
          <span id="heroArtist">—</span>
          <span class="dot"></span>
          <span id="heroYear">—</span>
          <span class="dot"></span>
          <span id="heroCount">0 tracks</span>
        </div>
        <div class="hero-actions">
          <button class="play-all-btn" id="playAllBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            Play
          </button>
          <button class="icon-btn" id="shuffleBtn" title="Shuffle">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
          </button>
        </div>
      </div>
    </section>

    <section class="tracklist">
      <div class="view-heading" id="viewHeading" style="display:none;">
        <span class="vh-title display" id="vhTitle">Search</span>
        <span class="vh-count" id="vhCount">0 tracks</span>
      </div>
      <div class="tl-head">
        <span>#</span>
        <span>Title</span>
        <span style="text-align:right;">Time</span>
        <span></span>
      </div>
      <div id="trackRows"></div>
      <div class="empty-note" id="linkNote"></div>
    </section>
  </main>

  <!-- ================= PLAYER BAR ================= -->
  <footer class="player-bar">
    <div class="pb-nowplaying">
      <img class="pb-art" id="pbArt" src="" alt="">
      <div class="pb-text">
        <div class="pb-title" id="pbTitle">Nothing playing</div>
        <div class="pb-artist" id="pbArtist">Pick a track to start</div>
      </div>
      <button class="pb-like" id="pbLike" title="Like">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.6l-1-1a5.5 5.5 0 10-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 000-7.8z"/></svg>
      </button>
    </div>

    <div class="pb-center">
      <div class="pb-controls">
        <button class="pb-ctrl-btn" id="shuffleBtn2" title="Shuffle">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
        </button>
        <button class="pb-ctrl-btn" id="prevBtn" title="Previous">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zM20 6L9 12l11 6z"/></svg>
        </button>
        <button class="pb-play" id="playBtn" title="Play/Pause">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="pb-ctrl-btn" id="nextBtn" title="Next">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM4 6l11 6-11 6z"/></svg>
        </button>
        <button class="pb-ctrl-btn" id="repeatBtn" title="Repeat">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 2l4 4-4 4M3 11V9a4 4 0 014-4h14M7 22l-4-4 4-4M21 13v2a4 4 0 01-4 4H3"/></svg>
        </button>
      </div>
      <div class="pb-progress-row">
        <span class="pb-time mono" id="curTime">0:00</span>
        <div class="pb-track-bar" id="seekBar">
          <div class="pb-track-bar-bg">
            <div class="pb-track-bar-fill" id="seekFill"></div>
          </div>
          <div class="pb-track-bar-handle" id="seekHandle"></div>
        </div>
        <span class="pb-time mono right" id="durTime">0:00</span>
      </div>
    </div>

    <div class="pb-right">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-faint)"><path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>
      <div class="pb-vol-row">
        <div class="pb-vol-bar" id="volBar">
          <div class="pb-vol-fill" id="volFill"></div>
        </div>
      </div>
    </div>
  </footer>

</div>

<audio id="audio" preload="metadata"></audio>

<script>
/* ============================================================
   YOUR MUSIC LIBRARY — edit this section
   ------------------------------------------------------------
   Each album has: id, title, artist, year, cover (image URL),
   and a tracks array. Each track needs: title, artist, duration
   (as "M:SS" — just for display, not required to be exact),
   and src — the actual playable audio URL (mp3/wav/ogg link).

   Leave src as "" if you don't have the link yet — the player
   will show it as unplayable until you fill it in.
   ============================================================ */
const ALBUMS = [
  {
    id: "nanchaku",
    title: "Nanchaku",
    artist: "Seedhe Maut",
    year: "2021",
    cover: "https://placehold.co/600x600/1a1512/f5a623?text=NANCHAKU",
    tracks: [
      { title: "Nanchaku", artist: "Seedhe Maut", duration: "3:12", src: "" },
      { title: "Sailaab", artist: "Seedhe Maut", duration: "3:45", src: "" },
      { title: "Namastute", artist: "Seedhe Maut", duration: "2:58", src: "" },
      { title: "Zinger", artist: "Seedhe Maut", duration: "3:20", src: "" },
    ]
  },
  {
    id: "krsna-album",
    title: "Ki Poori Pyaar",
    artist: "KR$NA",
    year: "2020",
    cover: "https://placehold.co/600x600/1a1512/c1272d?text=KRSNA",
    tracks: [
      { title: "Track 1 — rename me", artist: "KR$NA", duration: "3:00", src: "" },
      { title: "Track 2 — rename me", artist: "KR$NA", duration: "3:15", src: "" },
      { title: "Track 3 — rename me", artist: "KR$NA", duration: "2:40", src: "" },
    ]
  },
  {
    id: "your-next-album",
    title: "Add Your Next Mixtape",
    artist: "Duplicate this block",
    year: "2024",
    cover: "https://placehold.co/600x600/1a1512/9c9186?text=%2B+ADD",
    tracks: [
      { title: "Copy the album object above to add more", artist: "—", duration: "0:00", src: "" }
    ]
  }
];

/* ============================================================
   PLAYER LOGIC — you shouldn't need to edit below this line
   ============================================================ */
const audio = document.getElementById('audio');
let currentAlbumIdx = 0;
let isPlaying = false;
let shuffle = false;
let repeat = false;
let likedTracks = new Set();
let currentView = 'home'; // 'home' | 'search' | 'liked'
let activePlaying = { albumIdx: null, trackIdx: null };

const albumListEl = document.getElementById('albumList');
const trackRowsEl = document.getElementById('trackRows');
const linkNoteEl = document.getElementById('linkNote');
const heroSectionEl = document.getElementById('heroSection');
const viewHeadingEl = document.getElementById('viewHeading');
const vhTitleEl = document.getElementById('vhTitle');
const vhCountEl = document.getElementById('vhCount');
const searchInput = document.getElementById('searchInput');
const navItems = document.querySelectorAll('.nav-item');

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str ?? '';
  return div.innerHTML;
}

function formatTime(sec){
  if (!isFinite(sec)) return '0:00';
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

/* ---- sidebar: album list ---- */
function renderAlbumList(){
  albumListEl.innerHTML = '';
  ALBUMS.forEach((album, idx) => {
    const btn = document.createElement('button');
    btn.className = 'album-item' + (idx === currentAlbumIdx && currentView === 'home' ? ' active' : '');
    btn.innerHTML = `
      <img class="album-thumb" src="${album.cover}" alt="">
      <div>
        <div class="album-item-title">${escapeHtml(album.title)}</div>
        <div class="album-item-artist">${escapeHtml(album.artist)}</div>
      </div>`;
    btn.addEventListener('click', () => {
      currentAlbumIdx = idx;
      currentView = 'home';
      searchInput.value = '';
      render();
    });
    albumListEl.appendChild(btn);
  });
}

/* ---- hero (only shown on Home view) ---- */
function renderHero(){
  const album = ALBUMS[currentAlbumIdx];
  document.getElementById('heroArt').src = album.cover;
  document.getElementById('heroTitle').textContent = album.title;
  document.getElementById('heroArtist').textContent = album.artist;
  document.getElementById('heroYear').textContent = album.year;
  document.getElementById('heroCount').textContent = album.tracks.length + ' tracks';
}

/* ---- shared row builder: used by Home, Search, and Liked views ---- */
function buildTrackRow(albumIdx, idx, opts = {}){
  const album = ALBUMS[albumIdx];
  const track = album.tracks[idx];
  const key = album.id + idx;
  const isCurrent = (activePlaying.albumIdx === albumIdx && activePlaying.trackIdx === idx);
  const liked = likedTracks.has(key);

  const row = document.createElement('div');
  row.className = 'track-row' + (isCurrent ? ' playing' : '');
  row.innerHTML = `
    <div class="track-num">
      <span class="track-num-text mono">${idx + 1}</span>
      <span class="track-play-icon">
        ${isCurrent && isPlaying
          ? '<div class="eq-bars"><span></span><span></span><span></span></div>'
          : '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>'}
      </span>
    </div>
    <div class="track-info">
      <div class="track-title">${escapeHtml(track.title)}</div>
      <div class="track-artist">${escapeHtml(track.artist)}${opts.showAlbum ? ' · ' + escapeHtml(album.title) : ''}</div>
    </div>
    <div class="track-duration mono">${track.duration || '--:--'}</div>
    <button class="track-like ${liked ? 'active' : ''}" title="Like">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="${liked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.6l-1-1a5.5 5.5 0 10-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 000-7.8z"/></svg>
    </button>
  `;

  row.querySelector('.track-info').addEventListener('click', () => playTrack(albumIdx, idx));
  row.querySelector('.track-num').addEventListener('click', () => playTrack(albumIdx, idx));
  row.querySelector('.track-like').addEventListener('click', (e) => {
    e.stopPropagation();
    likedTracks.has(key) ? likedTracks.delete(key) : likedTracks.add(key);
    render(); // re-render so counts / liked view stay in sync
  });

  if (!track.src) row.style.opacity = '0.5';
  return row;
}

/* ---- Home view: current album's tracklist ---- */
function renderHomeTracks(){
  const album = ALBUMS[currentAlbumIdx];
  trackRowsEl.innerHTML = '';
  let missingLinks = 0;

  album.tracks.forEach((track, idx) => {
    if (!track.src) missingLinks++;
    trackRowsEl.appendChild(buildTrackRow(currentAlbumIdx, idx));
  });

  if (missingLinks > 0){
    linkNoteEl.style.display = 'block';
    linkNoteEl.style.borderColor = 'var(--line)';
    linkNoteEl.innerHTML = `<b>Heads up:</b> ${missingLinks} track${missingLinks > 1 ? 's' : ''} in this mixtape ${missingLinks > 1 ? "don't" : "doesn't"} have an audio link yet. Open the &lt;script&gt; section at the bottom of this file, find the <b>ALBUMS</b> array, and paste your song URL into the <b>src</b> field for each track.`;
  } else {
    linkNoteEl.style.display = 'none';
  }
}

/* ---- Search view: matches across ALL mixtapes ---- */
function renderSearchResults(query){
  trackRowsEl.innerHTML = '';
  const q = query.toLowerCase();
  let found = 0;

  ALBUMS.forEach((album, albumIdx) => {
    album.tracks.forEach((track, idx) => {
      const matches = track.title.toLowerCase().includes(q)
        || track.artist.toLowerCase().includes(q)
        || album.title.toLowerCase().includes(q);
      if (matches){
        found++;
        trackRowsEl.appendChild(buildTrackRow(albumIdx, idx, { showAlbum: true }));
      }
    });
  });

  vhTitleEl.textContent = 'Search results';
  vhCountEl.textContent = `${found} track${found === 1 ? '' : 's'} for "${query}"`;

  if (found === 0){
    linkNoteEl.style.display = 'block';
    linkNoteEl.style.borderColor = 'var(--line)';
    linkNoteEl.innerHTML = `<b>No matches.</b> Try a different track name, artist, or mixtape title.`;
  } else {
    linkNoteEl.style.display = 'none';
  }
}

/* ---- Liked Tracks view: all liked tracks across all mixtapes ---- */
function renderLikedTracks(){
  trackRowsEl.innerHTML = '';
  let found = 0;

  ALBUMS.forEach((album, albumIdx) => {
    album.tracks.forEach((track, idx) => {
      if (likedTracks.has(album.id + idx)){
        found++;
        trackRowsEl.appendChild(buildTrackRow(albumIdx, idx, { showAlbum: true }));
      }
    });
  });

  vhTitleEl.textContent = 'Liked Tracks';
  vhCountEl.textContent = `${found} track${found === 1 ? '' : 's'}`;

  if (found === 0){
    linkNoteEl.style.display = 'block';
    linkNoteEl.style.borderColor = 'var(--line)';
    linkNoteEl.innerHTML = `<b>No liked tracks yet.</b> Tap the heart icon on any track to add it here.`;
  } else {
    linkNoteEl.style.display = 'none';
  }
}

/* ---- master render dispatcher ---- */
function render(){
  const query = searchInput.value.trim();

  // update nav active states
  navItems.forEach(btn => {
    const isActiveView = query ? btn.dataset.view === 'search' : btn.dataset.view === currentView;
    btn.classList.toggle('active', isActiveView);
  });
  renderAlbumList();

  if (query){
    heroSectionEl.style.display = 'none';
    viewHeadingEl.style.display = 'flex';
    renderSearchResults(query);
    return;
  }

  if (currentView === 'liked'){
    heroSectionEl.style.display = 'none';
    viewHeadingEl.style.display = 'flex';
    renderLikedTracks();
    return;
  }

  // home
  heroSectionEl.style.display = 'flex';
  viewHeadingEl.style.display = 'none';
  renderHero();
  renderHomeTracks();
}

/* ---- playback ---- */
function playTrack(albumIdx, trackIdx){
  const track = ALBUMS[albumIdx].tracks[trackIdx];
  if (!track.src){
    flashNoLink();
    return;
  }
  activePlaying = { albumIdx, trackIdx };
  audio.src = track.src;
  audio.play().then(() => {
    isPlaying = true;
    updatePlayerBar();
    render();
    updatePlayIcon();
  }).catch(() => { flashNoLink(); });
}

function flashNoLink(){
  linkNoteEl.style.display = 'block';
  linkNoteEl.style.borderColor = 'var(--red)';
  setTimeout(() => { linkNoteEl.style.borderColor = 'var(--line)'; }, 700);
}

function updatePlayerBar(){
  if (activePlaying.trackIdx === null){
    document.getElementById('pbTitle').textContent = 'Nothing playing';
    document.getElementById('pbArtist').textContent = 'Pick a track to start';
    return;
  }
  const album = ALBUMS[activePlaying.albumIdx];
  const track = album.tracks[activePlaying.trackIdx];
  document.getElementById('pbTitle').textContent = track.title;
  document.getElementById('pbArtist').textContent = track.artist;
  document.getElementById('pbArt').src = album.cover;
}

function updatePlayIcon(){
  const icon = document.getElementById('playIcon');
  icon.innerHTML = isPlaying
    ? '<rect x="5" y="4" width="5" height="16"></rect><rect x="14" y="4" width="5" height="16"></rect>'
    : '<path d="M8 5v14l11-7z"></path>';
  document.getElementById('pbArt').classList.toggle('spinning', isPlaying);
}

function togglePlay(){
  if (activePlaying.trackIdx === null){
    const album = ALBUMS[currentAlbumIdx];
    const firstPlayable = album.tracks.findIndex(t => t.src);
    if (firstPlayable === -1){ flashNoLink(); return; }
    playTrack(currentAlbumIdx, firstPlayable);
    return;
  }
  if (isPlaying){
    audio.pause();
    isPlaying = false;
  } else {
    audio.play();
    isPlaying = true;
  }
  updatePlayIcon();
  render();
}

function stepTrack(direction){
  const albumIdx = activePlaying.albumIdx ?? currentAlbumIdx;
  const album = ALBUMS[albumIdx];
  if (!album) return;
  let idx = activePlaying.trackIdx ?? -1;
  const total = album.tracks.length;

  if (shuffle){
    idx = Math.floor(Math.random() * total);
  } else {
    idx = (idx + direction + total) % total;
  }
  playTrack(albumIdx, idx);
}

audio.addEventListener('ended', () => {
  if (repeat){
    audio.currentTime = 0;
    audio.play();
  } else {
    stepTrack(1);
  }
});

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('seekFill').style.width = pct + '%';
  document.getElementById('seekHandle').style.left = pct + '%';
  document.getElementById('curTime').textContent = formatTime(audio.currentTime);
  document.getElementById('durTime').textContent = formatTime(audio.duration);
});

/* ---- controls wiring ---- */
document.getElementById('playBtn').addEventListener('click', togglePlay);
document.getElementById('nextBtn').addEventListener('click', () => stepTrack(1));
document.getElementById('prevBtn').addEventListener('click', () => stepTrack(-1));
document.getElementById('playAllBtn').addEventListener('click', () => {
  const album = ALBUMS[currentAlbumIdx];
  const firstPlayable = album.tracks.findIndex(t => t.src);
  if (firstPlayable === -1){ flashNoLink(); return; }
  playTrack(currentAlbumIdx, firstPlayable);
});

function toggleShuffle(){
  shuffle = !shuffle;
  [document.getElementById('shuffleBtn'), document.getElementById('shuffleBtn2')].forEach(b => {
    b.style.color = shuffle ? 'var(--amber)' : '';
  });
}
document.getElementById('shuffleBtn').addEventListener('click', toggleShuffle);
document.getElementById('shuffleBtn2').addEventListener('click', toggleShuffle);

document.getElementById('repeatBtn').addEventListener('click', (e) => {
  repeat = !repeat;
  e.currentTarget.style.color = repeat ? 'var(--amber)' : '';
});

document.getElementById('pbLike').addEventListener('click', (e) => {
  e.currentTarget.classList.toggle('active');
});

/* ---- seek bar ---- */
const seekBar = document.getElementById('seekBar');
seekBar.addEventListener('click', (e) => {
  if (!audio.duration) return;
  const rect = seekBar.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
});

/* ---- volume bar ---- */
const volBar = document.getElementById('volBar');
const volFill = document.getElementById('volFill');
audio.volume = 0.7;
volBar.addEventListener('click', (e) => {
  const rect = volBar.getBoundingClientRect();
  const pct = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
  audio.volume = pct;
  volFill.style.width = (pct * 100) + '%';
});

/* ---- nav: Home / Search / Liked ---- */
navItems.forEach(btn => {
  btn.addEventListener('click', () => {
    const view = btn.dataset.view;
    currentView = view;
    if (view === 'search'){
      searchInput.focus();
    } else {
      searchInput.value = '';
    }
    render();
  });
});

/* ---- search input ---- */
searchInput.addEventListener('input', render);

/* ---- keyboard: spacebar play/pause ---- */
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && e.target.tagName !== 'INPUT'){
    e.preventDefault();
    togglePlay();
  }
});

/* ---- init ---- */
render();
volFill.style.width = '70%';
</script>
</body>
</html>
